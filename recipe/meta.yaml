{% set name = "astroid" %}
{% set version = "4.0.3" %}
{% set deselect_tests = " --deselect=tests/test_builder.py::BuilderTest::test_data_build_error_filename" %}
{% set deselect_tests = 'deselect_tests + " --deselect=tests/test_get_relative_base_path.py::TestModUtilsRelativePath::test_symlink_resolution"' %}
{% set deselect_tests = 'deselect_tests + " --deselect=tests/test_manager.py::AstroidManagerTest::test_identify_old_namespace_package_protocol"' %}  # [py==314]
{% set deselect_tests = 'deselect_tests + " --deselect=tests/test_manager.py::AstroidManagerTest::test_ast_from_module_name_pyz"' %}  # [win]
{% set deselect_tests = 'deselect_tests + " --deselect=tests/test_modutils.py::ModPathFromFileTest::test_import_symlink_both_outside_of_path"' %}  # [win]
{% set deselect_tests = 'deselect_tests + " --deselect=tests/test_modutils.py::ModPathFromFileTest::test_import_symlink_with_source_outside_of_path"' %}  # [win]
{% set deselect_tests = 'deselect_tests + " --deselect=tests/test_modutils.py::ModPathFromFileTest::test_load_from_module_symlink_on_symlinked_paths_in_syspath"' %}  # [win]
{% set ignore_tests = " --ignore=tests/test_nodes.py" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 08d1de40d251cc3dc4a7a12726721d475ac189e4e583d596ece7422bc176bda3

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<3100]

requirements:
  host:
    - python
    - pip
    - setuptools >=77
  run:
    - python
    - typing-extensions >=4  # [py<311]
    - typing_extensions >=4  # [py<311]

# >   with pytest.raises(AstroidSyntaxError, match="invalid escape sequence") as ctx:
# E   Failed: DID NOT RAISE <class 'astroid.exceptions.AstroidSyntaxError'>
# >   self.assertEqual(result, ["real"])
# E   AssertionError: None != ['real']
#>  __import__("pkg_resources").declare_namespace(__name__)
#   ^^^^^^^^^^^^^^^^^^^^^^^^^^^
#E  ModuleNotFoundError: No module named 'pkg_resources'
# Problems with syspath on win:
# E       FileNotFoundError: [WinError 3] The system cannot find the path specified: 'C:\\Users\\TASK_1~2\\AppData\\Local\\Temp\\secret.py'
# Test execution never ends in this file:
test:
  source_files:
    - tests
  imports:
    - astroid
    - astroid.arguments
    - astroid.astroid_manager
    - astroid.bases
    - astroid.brain
    - astroid.builder
    - astroid.const
    - astroid.context
    - astroid.decorators
    - astroid.exceptions
    - astroid.filter_statements
    - astroid.inference_tip
    - astroid.interpreter
    - astroid.manager
    - astroid.modutils
    - astroid.nodes
    - astroid.objects
    - astroid.raw_building
    - astroid.transforms
    - astroid.typing
    - astroid.util
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v tests {{ ignore_tests }} {{ deselect_tests }}
  requires:
    - pip
    - pytest
    - mypy

about:
  home: https://github.com/pylint-dev/astroid
  license: LGPL-2.1-or-later
  license_family: LGPL
  license_file: LICENSE
  summary: A abstract syntax tree for Python with inference support.
  description: |
    Astroid provide a common base representation of python source code for
    projects such as pychecker, pyreverse, pylint.
  doc_url: https://pylint.pycqa.org/projects/astroid
  dev_url: https://github.com/pylint-dev/astroid

extra:
  skip-lints:
    - invalid_url
  recipe-maintainers:
    - ericdill
    - jakirkham
    - jjhelmus
    - ocefpaf
